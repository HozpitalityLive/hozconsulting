<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Title -->
    <title>
      {% block title %}

      {% endblock %}
    </title>

    <meta name="description"
      content="{% block meta_description %}

      {% endblock %}" />

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='assets/img/innerpages/fav-logo.ico') }}" type="image/svg+xml" />
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/bootstrap.min.css') }}" />
    <!-- jQuery UI CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/jquery-ui.css') }}" />
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/bootstrap-icons.css') }}" />
    <!-- Animate CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/animate.min.css') }}" />
    <!-- FancyBox CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/jquery.fancybox.min.css') }}" />
    <!-- Nice Select CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/nice-select.css') }}" />
    <!-- Swiper CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/swiper-bundle.min.css') }}" />
    <!-- Boxicons -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/boxicons.min.css') }}" />
    <!-- Main Style -->
    <link rel="stylesheet" href="{{ url_for('static', filename='assets/css/style.css') }}" />
  </head>

  <body class="tt-magic-cursor corporate-consulting-home">
    <!-- Magic Cursor -->
    <div id="magic-cursor">
      <div id="ball"></div>
    </div>

    <!-- Back To Top -->
    <div id="scroll-percentage">
      <span id="scroll-percentage-value">0%</span>

      <svg class="arrow" width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <g>
          <path d="M7 1.55632L14 10.8896L0 10.8896L7 1.55632Z" />
        </g>
      </svg>
    </div>

    <!-- Main Wrapper -->
    <div id="smooth-wrapper">
      <div id="smooth-content">
        {% include 'partials/navbar.html' %}

        {% block content %}

        {% endblock %}

        {% include 'partials/footer.html' %}
      </div>
    </div>

    <!-- Email Decode -->
    <script data-cfasync="false" src="{{ url_for('static', filename='email-decode.min.js') }}"></script>

    <!-- jQuery -->
    <script src="{{ url_for('static', filename='assets/js/jquery-3.7.1.min.js') }}"></script>

    <!-- jQuery UI -->
    <script src="{{ url_for('static', filename='assets/js/jquery-ui.js') }}"></script>

    <!-- Bootstrap -->
    <script src="{{ url_for('static', filename='assets/js/bootstrap.min.js') }}"></script>

    <!-- Popper -->
    <script src="{{ url_for('static', filename='assets/js/popper.min.js') }}"></script>

    <!-- Swiper -->
    <script src="{{ url_for('static', filename='assets/js/swiper-bundle.min.js') }}"></script>

    <!-- WOW -->
    <script src="{{ url_for('static', filename='assets/js/wow.min.js') }}"></script>

    <!-- Nice Select -->
    <script src="{{ url_for('static', filename='assets/js/jquery.nice-select.min.js') }}"></script>

    <!-- GSAP -->
    <script src="{{ url_for('static', filename='assets/js/gsap.min.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/ScrollTrigger.min.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/ScrollSmoother.min.js') }}"></script>
    <script src="{{ url_for('static', filename='assets/js/SplitText.min.js') }}"></script>

    <!-- Fancybox -->
    <script src="{{ url_for('static', filename='assets/js/jquery.fancybox.min.js') }}"></script>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='assets/js/custom.js') }}"></script>
  </body>
</html>
