<!doctype html>
<html>
  <head>
    <title>Admin Login</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5" style="max-width: 500px">
      <div class="card">
        <div class="card-body p-4 rounded-4">
          <h3 class="mb-4 text-center">Hozpitality Consulting Login</h3>

          <form method="POST">
            <div class="mb-3">
              <label>Username</label>
              <input
                type="text"
                name="username"
                class="form-control"
                required
              />
            </div>

            <div class="mb-3">
              <label>Password</label>
              <input
                type="password"
                name="password"
                class="form-control"
                required
              />
            </div>

            <button type="submit" class="btn btn-primary w-100">Login</button>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
